<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Zilver/chrome metallic verloop met verticale glanslijnen conform de afbeelding -->
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A6AFB8" />
      <stop offset="25%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#E1E5E9" />
      <stop offset="55%" stop-color="#B5BDC4" />
      <stop offset="80%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8E969E" />
    </linearGradient>

    <!-- Subtiele donkere schaduw achter het icoon -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- ================= STRIK / LUSSEN ================= -->
    <!-- Linker lus -->
    <path d="M60,34 C48,16 34,22 41,34 C44,39 52,38 60,37" fill="none" stroke="url(#silverGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Rechter lus -->
    <path d="M60,34 C72,16 86,22 79,34 C76,39 68,38 60,37" fill="none" stroke="url(#silverGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Knoopje in het midden -->
    <circle cx="60" cy="35.5" r="2.5" fill="url(#silverGradient)" />

    <!-- ================= DEKSEL ================= -->
    <rect x="25" y="38" width="70" height="15" rx="4" fill="none" stroke="url(#silverGradient)" stroke-width="4.5" stroke-linejoin="round" />

    <!-- ================= DOOS ================= -->
    <path d="M30,53 L30,88 C30,93 34,97 39,97 L81,97 C86,97 90,93 90,88 L90,53" fill="none" stroke="url(#silverGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- ================= VERTICAAL LINT ================= -->
    <!-- Het brede zilveren lint dat over het deksel en de doos heen valt (ingevuld met het verloop) -->
    <rect x="51" y="38" width="18" height="15" fill="url(#silverGradient)" />
    <rect x="51" y="53.5" width="18" height="41.5" fill="url(#silverGradient)" />
  </g>
</svg>

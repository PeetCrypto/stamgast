<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 130" width="100%" height="100%">
  <defs>
    <!-- Premium goudverloop voor de lijnen en outlines -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3B3" />
      <stop offset="30%" stop-color="#D1A751" />
      <stop offset="70%" stop-color="#946E29" />
      <stop offset="100%" stop-color="#6E4E18" />
    </linearGradient>

    <!-- Verloop voor de platte, glanzende bovenkant van de munten -->
    <linearGradient id="coinFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDD1" />
      <stop offset="50%" stop-color="#EAD183" />
      <stop offset="100%" stop-color="#A8813B" />
    </linearGradient>

    <!-- Verloop voor de 3D-zijkanten van de muntsegmenten -->
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70501A" />
      <stop offset="25%" stop-color="#D6B05A" />
      <stop offset="50%" stop-color="#FFF5C2" />
      <stop offset="75%" stop-color="#C29A44" />
      <stop offset="100%" stop-color="#593F12" />
    </linearGradient>

    <!-- Subtiele donkere schaduw voor onder de iconen -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- ================= PORTEMONNEE ================= -->
    <!-- Briefgeld achtergrond (schuin uitstekend) -->
    <path d="M48,34 L88,20 C90,19.3 93,20.5 94,23 L97,33" fill="none" stroke="url(#goldLine)" stroke-width="4.5" stroke-linecap="round" />
    <path d="M57,34 L100,22 C102,21.3 105,22.5 106,25 L111,33" fill="none" stroke="url(#goldLine)" stroke-width="4.5" stroke-linecap="round" />

    <!-- De basis van de portemonnee -->
    <rect x="35" y="34" width="92" height="66" rx="14" fill="none" stroke="url(#goldLine)" stroke-width="5" stroke-linejoin="round" />

    <!-- De ronde sluitingsflap -->
    <path d="M108,50 L126,50 C131,50 135,54 135,59 L135,61 C135,66 131,70 126,70 L108,70" fill="#141416" stroke="url(#goldLine)" stroke-width="4.5" stroke-linejoin="round" />
    
    <!-- Drukknoopje -->
    <circle cx="123" cy="60" r="3" fill="url(#goldLine)" />


    <!-- ================= 3D MUNTEN ================= -->
    
    <!-- RECHTER STAPEL (4 munten hoog) -->
    <g transform="translate(195, 30)">
      <!-- Munt 4 (Onderste) -->
      <path d="M0,36 A22,7.5 0 0,0 44,36 L44,45 A22,7.5 0 0,1 0,45 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <!-- Munt 3 -->
      <path d="M0,27 A22,7.5 0 0,0 44,27 L44,36 A22,7.5 0 0,1 0,36 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <!-- Munt 2 -->
      <path d="M0,18 A22,7.5 0 0,0 44,18 L44,27 A22,7.5 0 0,1 0,27 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <!-- Munt 1 (Bovenste met platte bovenkant) -->
      <path d="M0,9 A22,7.5 0 0,0 44,9 L44,18 A22,7.5 0 0,1 0,18 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <ellipse cx="22" cy="9" rx="22" ry="7.5" fill="url(#coinFace)" stroke="url(#goldLine)" stroke-width="2" />
    </g>

    <!-- LINKER STAPEL (3 munten hoog, overlap vooraan) -->
    <g transform="translate(165, 54)">
      <!-- Munt 3 (Onderste) -->
      <path d="M0,18 A22,7.5 0 0,0 44,18 L44,27 A22,7.5 0 0,1 0,27 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <!-- Munt 2 -->
      <path d="M0,9 A22,7.5 0 0,0 44,9 L44,18 A22,7.5 0 0,1 0,18 Z" fill="url(#coinEdge)" stroke="url(#goldLine)" stroke-width="1.5" />
      <!-- Munt 1 (Bovenste met platte bovenkant) -->
      <ellipse cx="22" cy="9" rx="22" ry="7.5" fill="url(#coinFace)" stroke="url(#goldLine)" stroke-width="2" />
    </g>
  </g>
</svg>
